# Persistent volume claims
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notifier-statichtml
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs
  resources:
    requests:
      storage: 100Mi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: notifier-appdata-iscsi
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  iscsi:
    targetPortal: 192.168.178.170:3260
    iqn: iqn.2000-01.com.synology:synologyds223j.Target-1.d6161698174
    lun: 1
    fsType: ext4
    readOnly: false

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notifier-appdata
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: notifier-appdata-iscsi
  resources:
    requests:
      storage: 1Gi